name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    uses: ikhalas112/exp-release-tools/.github/workflows/release-macos.reusable.yml@v0.5.1
    with:
      tools_repo: ikhalas112/exp-release-tools
      tools_version: v0.5.1
      game_name: mock-mac-game
      config_json: |
        {
          "distribution": "single_exe",
          "source": "build",
          "macos": {
            "appBundle": "SnakeDesktop.app",
            "outputFile": "SnakeDesktop-macos.zip",
            "versionFileDir": "Contents/Resources",
            "mockFixture": "target/dx/snake-desktop/bundle/macos/macos"
          },
          "r2": { "bucket": "mockmacgame" },
          "launcher": { "min_version": "1.0.0" },
          "concurrency": { "upload": 8 },
          "cdnBaseUrl": "",
          "runner": { "workspaceMode": "fresh" }
        }
      # Build the real Snake .app, then stage it into build/SnakeDesktop.app
      # so package (ditto) packs the actual game instead of a mock fixture.
      build_command: |
        cargo install dioxus-cli --version 0.7.9 --locked || true
        dx bundle --desktop --package snake-desktop
        rm -rf build && mkdir -p build
        ditto target/dx/snake-desktop/bundle/macos/macos/SnakeDesktop.app build/SnakeDesktop.app
    secrets:
      TOOLS_DOWNLOAD_TOKEN: ${{ secrets.TOOLS_DOWNLOAD_TOKEN }}
